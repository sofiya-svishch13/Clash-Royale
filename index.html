<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Stage 1</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
</head>
<body>

  
    <canvas id="gameCanvas" width="800" height="600" style="border:1px solid black;"></canvas>    

        <!-- Новая панель UI - без кнопок, карты рисуются на Canvas -->
    <div class="ui-bar" style="position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; pointer-events: none; z-index: 100;">
        <div id="deck-info" style="background: rgba(0,0,0,0.7); display: inline-block; padding: 5px 15px; border-radius: 10px; color: white; font-size: 12px;">
            🃏 Нажмите 1-4 для выбора карты | Кликните на арену для призыва
        </div>
    </div>
    <button id="btnReset" style="position: fixed; bottom: 10px; left: 10px; z-index: 200;">🔄 Новая битва</button>

    <audio id="deploySound" preload="auto"></audio>
    <!-- Stage 1 Scripts -->
    <script src="js/config/config.js"></script>
    <script src="js/classes/unit.js"></script>
    <script src="js/classes/deck.js"></script>
    <script src="js/classes/card.js"></script>
    <script src="js/classes/tower.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/audio/sound.js"></script>
    <script src="js/ui/ui.js"></script>
    <script src="js/graphics/graphics.js"></script>
    <script src="js/state/state.js"></script>
    <script src="js/core/ai.js"></script>
    <script src="js/core/core.js"></script>
    <script src="js/main.js"></script>
    <script src="js/tests/qa.js"></script>

</body>
</html>
